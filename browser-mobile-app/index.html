<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8eef0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Bloom Club" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/docs/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <title>Bloom Club</title>
  </head>
  <body>
    <section
      id="bloom-startup-loader"
      role="status"
      aria-live="polite"
      style="position: fixed; inset: 0; z-index: 2147483646; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #fffdfb 0%, #fff7f7 50%, #f8eef2 100%); opacity: 1; transition: opacity 280ms ease; color: #2b1b22; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; flex-direction: column; gap: 16px; padding: 24px; box-sizing: border-box; text-align: center;"
    >
      <video
        id="bloom-startup-video"
        src="/assets/loader/аним.mp4"
        autoplay
        muted
        playsinline
        webkit-playsinline
        preload="auto"
        aria-hidden="true"
        style="display: block; width: clamp(180px, 42vw, 220px); height: clamp(180px, 42vw, 220px); object-fit: contain; background: transparent;"
      ></video>
      <h1 style="margin: 0; color: rgba(53, 39, 43, 0.64); font-size: 0.95rem; font-weight: 600;">Bloom Club загружается</h1>
      <p style="margin: 0; color: rgba(53, 39, 43, 0.42); font-size: 0.82rem;">Если экран не меняется больше 10 секунд, закройте и откройте приложение заново</p>
    </section>
    <script>
      window.__BLOOM_HTML_FALLBACK_PRESENT__ = true;
      window.__BLOOM_HTML_FALLBACK_REMOVED__ = false;
      window.__BLOOM_ENTRY_SCRIPT_EXECUTED__ = false;
      window.__BLOOM_EARLY_STARTUP_TRACE__ = window.__BLOOM_EARLY_STARTUP_TRACE__ || [];
      window.__BLOOM_RESOURCE_ERROR_TRACE__ = window.__BLOOM_RESOURCE_ERROR_TRACE__ || [];
      window.__BLOOM_EARLY_STARTUP_TRACE__.push({ step: "html_inline_before_module", at: new Date().toISOString(), href: location.href });
      window.addEventListener("error", function bloomEarlyError(event) {
        var target = event && event.target;
        var isResource = target && target !== window && (target.src || target.href);
        var payload = {
          at: new Date().toISOString(),
          kind: isResource ? "resource_error" : "window_error",
          message: event && event.message ? String(event.message) : "",
          filename: event && event.filename ? String(event.filename) : "",
          line: event && event.lineno || 0,
          column: event && event.colno || 0,
          tagName: isResource && target.tagName ? String(target.tagName).toLowerCase() : "",
          url: isResource ? String(target.src || target.href || "") : "",
        };
        window.__BLOOM_RESOURCE_ERROR_TRACE__.push(payload);
        window.__BLOOM_EARLY_STARTUP_TRACE__.push(payload);
      }, true);
      window.addEventListener("unhandledrejection", function bloomEarlyRejection(event) {
        window.__BLOOM_EARLY_STARTUP_TRACE__.push({ at: new Date().toISOString(), kind: "unhandledrejection", reason: String(event && event.reason && (event.reason.message || event.reason) || "") });
      });
      window.setTimeout(function bloomHtmlEntryWatchdog() {
        if (window.__BLOOM_ENTRY_SCRIPT_EXECUTED__ === true || window.__BLOOM_HTML_FALLBACK_REMOVED__ === true) {
          return;
        }

      }, 8000);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
